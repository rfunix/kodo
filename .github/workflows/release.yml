name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos-arm64:
    name: Build (macos-arm64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Z3
        run: brew install z3

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-macos-arm64

      - name: Build kodoc
        run: cargo build --release -p kodoc

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/kodoc dist/kodoc-macos-arm64
          chmod +x dist/kodoc-macos-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kodoc-macos-arm64
          path: dist/kodoc-macos-arm64

  build-macos-x86_64:
    name: Build (macos-x86_64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Install Z3
        run: brew install z3

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-macos-x86_64

      - name: Build kodoc
        run: cargo build --release -p kodoc --target x86_64-apple-darwin

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/x86_64-apple-darwin/release/kodoc dist/kodoc-macos-x86_64
          chmod +x dist/kodoc-macos-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kodoc-macos-x86_64
          path: dist/kodoc-macos-x86_64

  build-linux-x86_64:
    name: Build (linux-x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Z3
        run: sudo apt-get update && sudo apt-get install -y libz3-dev

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-linux-x86_64

      - name: Build kodoc
        run: cargo build --release -p kodoc

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/release/kodoc dist/kodoc-linux-x86_64
          chmod +x dist/kodoc-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kodoc-linux-x86_64
          path: dist/kodoc-linux-x86_64

  release:
    name: Create Release
    needs: [build-macos-arm64, build-macos-x86_64, build-linux-x86_64]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename binaries
        run: |
          mkdir -p release_assets
          cp artifacts/kodoc-macos-arm64/kodoc-macos-arm64 release_assets/kodoc-macos-arm64
          cp artifacts/kodoc-macos-x86_64/kodoc-macos-x86_64 release_assets/kodoc-macos-x86_64
          cp artifacts/kodoc-linux-x86_64/kodoc-linux-x86_64 release_assets/kodoc-linux-x86_64
          chmod +x release_assets/kodoc-macos-arm64
          chmod +x release_assets/kodoc-macos-x86_64
          chmod +x release_assets/kodoc-linux-x86_64

      - name: Extract changelog for this version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          awk "/^## \[${VERSION}\]/{found=1; next} /^## \[/{if(found) exit} found{print}" CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "Release ${TAG}" > release_notes.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PRERELEASE=""
          if echo "$TAG" | grep -qE '(alpha|beta|rc)'; then
            PRERELEASE="--prerelease"
          fi
          gh release create "$TAG" \
            --title "Kōdo $TAG" \
            --notes-file release_notes.md \
            $PRERELEASE \
            release_assets/kodoc-macos-arm64 \
            release_assets/kodoc-macos-x86_64 \
            release_assets/kodoc-linux-x86_64
